naftiko: 1.0.0-alpha2
info:
  label: AQICN JSON Air Quality API — Map
  description: 'AQICN JSON Air Quality API — Map. 1 operations. Lead operation: Air Quality Programmatic APIs AQICN Get Stations
    Within Map Bounds. Self-contained Naftiko capability covering one Air Quality Programmatic Apis business surface.'
  tags:
  - Air Quality Programmatic Apis
  - Map
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AIR_QUALITY_PROGRAMMATIC_APIS_API_KEY: AIR_QUALITY_PROGRAMMATIC_APIS_API_KEY
capability:
  consumes:
  - type: http
    namespace: aqicn-json-map
    baseUri: https://api.waqi.info
    description: AQICN JSON Air Quality API — Map business capability. Self-contained, no shared references.
    resources:
    - name: map-bounds
      path: /map/bounds/
      operations:
      - name: getstationsinbounds
        method: GET
        description: Air Quality Programmatic APIs AQICN Get Stations Within Map Bounds
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: latlng
          in: query
          type: string
          description: Bounding box as lat1,lng1,lat2,lng2
          required: true
        - name: networks
          in: query
          type: string
          description: Filter by network (all, china, us, etc.)
        - name: token
          in: query
          type: string
          description: API authentication token
          required: true
    authentication:
      type: apikey
      key: token
      value: '{{env.AIR_QUALITY_PROGRAMMATIC_APIS_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: aqicn-json-map-rest
    port: 8080
    description: REST adapter for AQICN JSON Air Quality API — Map. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/map/bounds
      name: map-bounds
      description: REST surface for map-bounds.
      operations:
      - method: GET
        name: getstationsinbounds
        description: Air Quality Programmatic APIs AQICN Get Stations Within Map Bounds
        call: aqicn-json-map.getstationsinbounds
        with:
          latlng: rest.latlng
          networks: rest.networks
          token: rest.token
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: aqicn-json-map-mcp
    port: 9090
    transport: http
    description: MCP adapter for AQICN JSON Air Quality API — Map. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: air-quality-programmatic-apis-aqicn
      description: Air Quality Programmatic APIs AQICN Get Stations Within Map Bounds
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: aqicn-json-map.getstationsinbounds
      with:
        latlng: tools.latlng
        networks: tools.networks
        token: tools.token
      outputParameters:
      - type: object
        mapping: $.
