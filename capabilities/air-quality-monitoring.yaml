naftiko: 1.0.0-alpha2
info:
  label: Air Quality Monitoring Workflow
  description: Unified workflow for querying real-time air quality data, monitoring station health, and spatial air quality
    analysis. Used by environmental monitoring applications and public health systems.
  tags:
  - Air Quality
  - Environment
  - Public Health
  - Open Data
  - Monitoring
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AQICN_API_TOKEN: AQICN_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: aqicn
    baseUri: https://api.waqi.info
    description: AQICN real-time air quality JSON API
    authentication:
      type: apikey
      key: token
      value: '{{AQICN_API_TOKEN}}'
      placement: query
    resources:
    - name: stations-by-city
      path: /feed/{city}/
      description: Get air quality by city name
      operations:
      - name: get-aqi-by-city
        method: GET
        description: Get real-time AQI for a city
        inputParameters:
        - name: city
          in: path
          type: string
          required: true
          description: City name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: stations-by-geo
      path: /feed/geo:{lat};{lng}/
      description: Get air quality by coordinates
      operations:
      - name: get-aqi-by-coordinates
        method: GET
        description: Get real-time AQI for geographic coordinates
        inputParameters:
        - name: lat
          in: path
          type: number
          required: true
          description: Latitude
        - name: lng
          in: path
          type: number
          required: true
          description: Longitude
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: station-search
      path: /search/
      description: Search for stations
      operations:
      - name: search-stations
        method: GET
        description: Search monitoring stations by keyword
        inputParameters:
        - name: keyword
          in: query
          type: string
          required: true
          description: Search keyword
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: stations-in-bounds
      path: /map/bounds/
      description: Get stations in map bounds
      operations:
      - name: get-stations-in-bounds
        method: GET
        description: Get all stations within a geographic bounding box
        inputParameters:
        - name: latlng
          in: query
          type: string
          required: true
          description: Bounding box coordinates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: air-quality-monitoring-api
    description: Unified REST API for air quality data retrieval and monitoring.
    resources:
    - path: /v1/air-quality/city/{city}
      name: aqi-by-city
      description: Air quality by city name
      operations:
      - method: GET
        name: get-aqi-by-city
        description: Get current AQI for a city
        call: aqicn.get-aqi-by-city
        with:
          city: rest.city
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/air-quality/coordinates
      name: aqi-by-coordinates
      description: Air quality by coordinates
      operations:
      - method: GET
        name: get-aqi-by-coordinates
        description: Get AQI for coordinates
        call: aqicn.get-aqi-by-coordinates
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/stations/search
      name: station-search
      description: Search monitoring stations
      operations:
      - method: GET
        name: search-stations
        description: Search stations by keyword
        call: aqicn.search-stations
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9080
    namespace: air-quality-monitoring-mcp
    transport: http
    description: MCP server for AI-assisted air quality data retrieval and environmental analysis.
    tools:
    - name: get-aqi-by-city
      description: Get real-time air quality index (AQI) and pollutant data for a city
      hints:
        readOnly: true
        openWorld: true
      call: aqicn.get-aqi-by-city
      with:
        city: tools.city
      outputParameters:
      - type: object
        mapping: $.
    - name: get-aqi-by-coordinates
      description: Get real-time AQI for a geographic location using latitude and longitude
      hints:
        readOnly: true
        openWorld: true
      call: aqicn.get-aqi-by-coordinates
      outputParameters:
      - type: object
        mapping: $.
    - name: search-air-quality-stations
      description: Search for air quality monitoring stations by city or station name
      hints:
        readOnly: true
        openWorld: true
      call: aqicn.search-stations
      outputParameters:
      - type: object
        mapping: $.
