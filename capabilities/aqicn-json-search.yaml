naftiko: 1.0.0-alpha2
info:
  label: AQICN JSON Air Quality API — Search
  description: 'AQICN JSON Air Quality API — Search. 1 operations. Lead operation: Air Quality Programmatic APIs AQICN Search
    Monitoring Stations. Self-contained Naftiko capability covering one Air Quality Programmatic Apis business surface.'
  tags:
  - Air Quality Programmatic Apis
  - Search
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AIR_QUALITY_PROGRAMMATIC_APIS_API_KEY: AIR_QUALITY_PROGRAMMATIC_APIS_API_KEY
capability:
  consumes:
  - type: http
    namespace: aqicn-json-search
    baseUri: https://api.waqi.info
    description: AQICN JSON Air Quality API — Search business capability. Self-contained, no shared references.
    resources:
    - name: search
      path: /search/
      operations:
      - name: searchstations
        method: GET
        description: Air Quality Programmatic APIs AQICN Search Monitoring Stations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: keyword
          in: query
          type: string
          description: Search keyword (city or station name)
          required: true
        - name: token
          in: query
          type: string
          description: API authentication token
          required: true
    authentication:
      type: apikey
      key: token
      value: '{{env.AIR_QUALITY_PROGRAMMATIC_APIS_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: aqicn-json-search-rest
    port: 8080
    description: REST adapter for AQICN JSON Air Quality API — Search. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/search
      name: search
      description: REST surface for search.
      operations:
      - method: GET
        name: searchstations
        description: Air Quality Programmatic APIs AQICN Search Monitoring Stations
        call: aqicn-json-search.searchstations
        with:
          keyword: rest.keyword
          token: rest.token
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: aqicn-json-search-mcp
    port: 9090
    transport: http
    description: MCP adapter for AQICN JSON Air Quality API — Search. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: air-quality-programmatic-apis-aqicn
      description: Air Quality Programmatic APIs AQICN Search Monitoring Stations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: aqicn-json-search.searchstations
      with:
        keyword: tools.keyword
        token: tools.token
      outputParameters:
      - type: object
        mapping: $.
